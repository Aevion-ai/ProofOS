name: Mirror from Aevion-Verifiable-AI monorepo

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'  # Weekly, Sunday 06:00 UTC
  repository_dispatch:
    types: [monorepo-release]

permissions:
  contents: write

# Only one mirror run at a time; cancel an in-progress run if a newer trigger
# arrives. Keeps Actions minutes predictable and avoids duplicate commits.
concurrency:
  group: mirror-from-monorepo
  cancel-in-progress: true

jobs:
  mirror:
    name: Sync governed subset from monorepo
    runs-on: ubuntu-latest
    # Prevent accidental runs on forks; this repo only makes sense in the
    # Aevion-ai org.
    if: github.repository == 'Aevion-ai/ProofOS'
    timeout-minutes: 30
    steps:
      - name: Checkout ProofOS
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout canonical monorepo
        # Deploy keys are disabled on the monorepo, so we use a PAT with
        # contents:read (and metadata:read) scope for Aevion-ai/Aevion-Verifiable-AI.
        uses: actions/checkout@v4
        with:
          repository: Aevion-ai/Aevion-Verifiable-AI
          path: .monorepo
          token: ${{ secrets.MONOREPO_MIRROR_TOKEN }}
          fetch-depth: 1

      - name: Sync allow-listed paths
        id: sync
        run: |
          python3 - <<'PY'
          import datetime as dt
          import os
          import re
          import shutil
          import subprocess
          from pathlib import Path

          source_sha = subprocess.check_output(
              ["git", "-C", ".monorepo", "rev-parse", "HEAD"], text=True
          ).strip()
          last_sync = dt.datetime.now(dt.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"source_sha={source_sha}\n")
              f.write(f"last_sync={last_sync}\n")

          manifest = Path("MIRROR_MANIFEST.md")
          text = manifest.read_text(encoding="utf-8")

          for line in text.splitlines():
              m = re.match(r"^\s*src:\s*(.+?)\s*->\s*(.+?)\s*$", line)
              if not m:
                  continue
              src, dst = m.group(1), m.group(2)
              src_path = Path(".monorepo") / src
              if not src_path.exists():
                  print(f"SKIP: source not found: {src}")
                  continue
              dst_path = Path(dst)
              print(f"COPY: {src} -> {dst}")
              if dst_path.exists():
                  shutil.rmtree(dst_path) if dst_path.is_dir() else dst_path.unlink()
              dst_path.parent.mkdir(parents=True, exist_ok=True)
              if src_path.is_dir():
                  shutil.copytree(src_path, dst_path)
              else:
                  shutil.copy2(src_path, dst_path)

          text = re.sub(
              r"^(\| `source_commit` \| `)[^`]*(` \|)$",
              rf"\g<1>{source_sha}\g<2>",
              text,
              flags=re.MULTILINE,
          )
          text = re.sub(
              r"^(\| `last_sync` \| `)[^`]*(` \|)$",
              rf"\g<1>{last_sync}\g<2>",
              text,
              flags=re.MULTILINE,
          )
          manifest.write_text(text, encoding="utf-8")
          PY

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -q

      - name: Configure git
        run: |
          git config user.name "Aevion Mirror Bot"
          git config user.email "mirror@aevion.ai"

      - name: Commit candidate and scan for secrets
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "NO_CHANGES=true" >> "$GITHUB_ENV"
            echo "No changes to mirror."
            exit 0
          fi
          git commit -m "mirror: sync from Aevion-Verifiable-AI (${SOURCE_SHA})"
          docker run --rm -v "$PWD":/tmp -w /tmp \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///tmp/ --since-commit HEAD~1 --branch HEAD --only-verified --fail --no-update
        env:
          SOURCE_SHA: ${{ steps.sync.outputs.source_sha }}

      - name: Push to main
        if: env.NO_CHANGES != 'true'
        run: |
          git push origin main
