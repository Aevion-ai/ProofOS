name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt 2>/dev/null || pip install pytest pydantic jsonschema
      - run: pytest tests/ -q

  metric-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Recomputes the real Lean inventory; fails if any public surface claims
      # more theorems/files/obligations than the repo contains, or carries
      # RED-gated framing / INTERNAL_ONLY codenames.
      - run: python scripts/metric_gate.py

  lean-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
